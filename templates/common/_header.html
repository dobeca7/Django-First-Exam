<header class="brand-shell text-white border-bottom border-0 shadow-sm">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'home' %}">Future Football Stars</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse main-nav-shell" id="mainNav">
                <div class="nav-balance d-none d-lg-block"></div>
                <ul class="navbar-nav nav-center">
                    <li class="nav-item"><a class="nav-link text-white" href="{% url 'academy-list' %}">Academies</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="{% url 'match-list' %}">Matches</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="{% url 'report-list' %}">Scout Reports</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="{% url 'player-list' %}">Players</a></li>
                </ul>
                <ul class="navbar-nav nav-actions">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link text-white" href="{% url 'account-dashboard' %}">Profile</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="{% url 'account-profile-edit' %}">Edit Profile</a></li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'account-logout' %}" class="d-inline">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-link nav-link text-white text-decoration-none">Logout</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link text-white" href="{% url 'account-login' %}">Login</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="{% url 'account-register' %}">Register</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
</header>
