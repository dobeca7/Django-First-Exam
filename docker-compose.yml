version: "3.9"

services:

  web:

    build: .

    container_name: future_stars_web

    restart: always

    command: gunicorn future_stars.wsgi:application --bind 0.0.0.0:8000

    volumes:

      - .:/app

      - static_volume:/app/static_root

    depends_on:

      - db

    environment:

      - DEBUG=0

      - DATABASE_URL=postgres://postgres:rafaelnadal@db:5432/future_stars



  db:

    image: postgres:16

    container_name: future_stars_db

    restart: always

    environment:

      POSTGRES_DB: future_stars

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: rafaelnadal

    volumes:

      - postgres_data:/var/lib/postgresql/data/



  nginx:

    image: nginx:latest

    container_name: future_stars_nginx

    restart: always

    ports:

      - "80:80"

    volumes:

      - static_volume:/app/static_root

      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:

      - web



volumes:

  postgres_data:

  static_volume: