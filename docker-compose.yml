version: "3.9"

services:
  web:
    build: .
    container_name: future_stars_web
    restart: always
    command: gunicorn future_stars.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/static_root
    depends_on:
      - db
      - redis
    environment:
      DEBUG: ${DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me}
      DB_NAME: ${DB_NAME:-future_stars}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://127.0.0.1,http://localhost}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}

  celery:
    build: .
    container_name: future_stars_celery
    restart: always
    command: celery -A future_stars worker --pool=solo --loglevel=info
    volumes:
      - .:/app
      - static_volume:/app/static_root
    depends_on:
      - db
      - redis
    environment:
      DEBUG: ${DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me}
      DB_NAME: ${DB_NAME:-future_stars}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://127.0.0.1,http://localhost}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}

  redis:
    image: redis:7-alpine
    container_name: future_stars_redis
    restart: always

  db:
    image: postgres:16
    container_name: future_stars_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-future_stars}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  nginx:
    image: nginx:latest
    container_name: future_stars_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/static_root
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
